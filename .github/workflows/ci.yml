name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum

      - name: Download Modules
        run: go mod download

      - name: Run Tests
        run: go test ./...

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t memobase-backend:ci ./backend

      - name: Build Frontend Image
        run: docker build -t memobase-frontend:ci ./frontend
