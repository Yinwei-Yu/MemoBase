syntax = "proto3";

package memo.agent;

option go_package = "memobase/backend/proto";

// AgentService handles AI agent chat with RAG capabilities.
service AgentService {
  // Unary: simple request/response for non-streaming callers.
  rpc ChatCompletion(ChatRequest) returns (ChatResponse);

  // Server-streaming: token-by-token for frontend SSE.
  rpc ChatCompletionStream(ChatRequest) returns (stream ChatEvent);

  // Health check.
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

// ─── Request ──────────────────────────────────────────────────────────────────

message ChatRequest {
  string session_id = 1;
  string kb_id = 2;
  string question = 3;
  string model = 4;             // optional override
  int32 top_k = 5;
  repeated Message history = 6; // chat history from DB
  repeated Memory memories = 7; // session memories from DB
}

message Message {
  string role = 1;     // "user" or "assistant"
  string content = 2;
  string created_at = 3;
}

message Memory {
  string type = 1;
  string summary = 2;
}

// ─── Streaming events ─────────────────────────────────────────────────────────

message ChatEvent {
  oneof event {
    AgentStepEvent step = 1;       // agent state transitions
    TokenEvent token = 2;          // LLM token streaming
    FinalResultEvent result = 3;   // final answer + citations
    ErrorEvent error = 4;          // error during processing
  }
}

message AgentStepEvent {
  string step_name = 1;            // "decide", "retrieve", "grade", "rewrite", "generate"
  string status = 2;               // "started", "completed", "skipped"
  string detail = 3;               // human-readable description
  int64 duration_ms = 4;
  map<string, string> metadata = 5;
}

message TokenEvent {
  string token = 1;
  int32 token_index = 2;
}

message FinalResultEvent {
  string answer = 1;
  repeated Citation citations = 2;
  repeated TraceStep trace = 3;
  TokenUsage token_usage = 4;
  bool degraded = 5;
  int64 latency_ms = 6;
}

message ErrorEvent {
  string code = 1;    // "RETRIEVAL_FAILED", "MODEL_UNAVAILABLE", etc.
  string message = 2;
}

// ─── Shared types ─────────────────────────────────────────────────────────────

message Citation {
  string doc_id = 1;
  string doc_title = 2;
  string chunk_id = 3;
  string snippet = 4;
  double score = 5;
  string retrieval_source = 6;  // "bm25", "vector", "fused", "mcp"
}

message TraceStep {
  string node = 1;              // which graph node
  string action = 2;            // what it did
  int64 duration_ms = 3;
  map<string, string> data = 4;
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

// ─── Unary response ───────────────────────────────────────────────────────────

message ChatResponse {
  string answer = 1;
  repeated Citation citations = 2;
  repeated TraceStep trace = 3;
  TokenUsage token_usage = 4;
  bool degraded = 5;
  int64 latency_ms = 6;
}

// ─── Health ───────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  string status = 1;
  map<string, string> checks = 2;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TextProcessorService — CJK-aware text tokenization and document chunking
// ═══════════════════════════════════════════════════════════════════════════════

service TextProcessorService {
  // Tokenize text for BM25 indexing (CJK-aware segmentation with jieba).
  rpc Tokenize(TokenizeRequest) returns (TokenizeResponse);

  // Chunk document respecting markdown structure and sentence boundaries.
  rpc ChunkDocument(ChunkRequest) returns (ChunkResponse);

  // Hybrid retrieval: BM25 + vector search + RRF fusion.
  rpc RetrieveChunks(RetrieveChunksRequest) returns (RetrieveChunksResponse);

  // Invalidate BM25 cache for a knowledge base.
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);

  // Health check.
  rpc TextHealthCheck(HealthRequest) returns (HealthResponse);
}

message RetrieveChunksRequest {
  string kb_id = 1;
  string query = 2;
  int32 top_k = 3;
}

message RetrievedChunk {
  string chunk_id = 1;
  string doc_id = 2;
  string content = 3;
  double score = 4;
  string source = 5;       // "bm25", "vector", "fused"
}

message RetrieveChunksResponse {
  repeated RetrievedChunk chunks = 1;
  bool degraded = 2;
}

message InvalidateCacheRequest {
  string kb_id = 1;
}

message InvalidateCacheResponse {
  bool cleared = 1;
}

message TokenizeRequest {
  string text = 1;
}

message TokenizeResponse {
  repeated string tokens = 1;
}

message ChunkRequest {
  string content = 1;
  int32 max_chunk_size = 2;    // default 500
  int32 overlap = 3;           // default 100
  optional bool markdown_aware = 4;     // default true
}

message ChunkResponse {
  repeated string chunks = 1;
}
