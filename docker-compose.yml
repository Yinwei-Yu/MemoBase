services:
  postgres:
    image: postgres:16
    container_name: memobase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memo
      POSTGRES_USER: memo
      POSTGRES_PASSWORD: memo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo -d memo"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: memobase-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/collections >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: memobase-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend

  backend:
    build:
      context: ./backend
    container_name: memobase-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      APP_ENV: dev
      PORT: 8080
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: memo-dev-secret
      TOKEN_TTL_HOURS: 2
      ENABLE_DEMO_USER: "true"
      DATABASE_URL: postgres://memo:memo@postgres:5432/memo?sslmode=disable
      STORAGE_DIR: /app/storage
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: qwen2.5:3b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_TIMEOUT_SEC: 120
      BM25_WEIGHT: 0.5
      VECTOR_WEIGHT: 0.5
    ports:
      - "8080:8080"
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/api/v1/readyz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8080/api/v1
    container_name: memobase-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - frontend

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  backend_storage:

networks:
  backend:
  frontend:
