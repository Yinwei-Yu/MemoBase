services:
  postgres:
    image: postgres:16
    container_name: memobase-postgres
    environment:
      POSTGRES_DB: memo
      POSTGRES_USER: memo
      POSTGRES_PASSWORD: memo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo -d memo"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: memobase-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: memobase-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]

  backend:
    build:
      context: ./backend
    container_name: memobase-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      APP_ENV: dev
      PORT: 8080
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: memo-dev-secret
      TOKEN_TTL_HOURS: 2
      DATABASE_URL: postgres://memo:memo@postgres:5432/memo?sslmode=disable
      STORAGE_DIR: /app/storage
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: qwen2.5:3b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_TIMEOUT_SEC: 120
      BM25_WEIGHT: 0.5
      VECTOR_WEIGHT: 0.5
    ports:
      - "8080:8080"
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: memobase-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE: http://localhost:8080/api/v1
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  backend_storage:
